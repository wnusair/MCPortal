{% extends 'base.html' %}

{% block title %}Password · {{ app_name }}{% endblock %}

{% block content %}
<section class="page-section narrow">
  <article class="card">
    <p class="eyebrow">Account security</p>
    <h2>Change password</h2>
    <form method="post" class="stack-form">
      {{ form.hidden_tag() }}
      <label>{{ form.current_password.label }} {{ form.current_password(class_='input') }}</label>
      <label>{{ form.new_password.label }} {{ form.new_password(class_='input') }}</label>
      <label>{{ form.confirm_password.label }} {{ form.confirm_password(class_='input') }}</label>
      <button type="submit" class="btn btn-primary">{{ form.submit.label.text }}</button>
    </form>
  </article>
</section>
{% endblock %}
