name: Security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Dependency audit
        run: pip-audit
      - name: Static security scan
        run: bandit -r app